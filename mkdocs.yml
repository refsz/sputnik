site_name: Sputnik
site_description: A PHP TaskRunner for project automation
site_url: https://refsz.github.io/sputnik
repo_url: https://github.com/refsz/sputnik
repo_name: refsz/sputnik

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/rocket-launch
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.path
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Project Structure: project-structure.md
  - Guide:
      - Writing Tasks: tasks.md
      - Configuration: configuration.md
      - Variables: variables.md
      - Templates: templates.md
      - Contexts: contexts.md
      - Event Listeners: listeners.md
      - Environments: environments.md
  - Recipes: recipes.md
  - Reference:
      - CLI Reference: cli.md

extra_css:
  - https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 Marcel Reuss

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/refsz/sputnik
    - icon: fontawesome/brands/packagist
      link: https://packagist.org/packages/refs/sputnik

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
