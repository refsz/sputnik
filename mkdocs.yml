site_name: Sputnik
site_description: Modern PHP TaskRunner with class-based tasks, environment-aware execution, and template engine
site_url: https://refsz.github.io/sputnik
repo_url: https://github.com/refsz/sputnik
repo_name: refsz/sputnik

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.highlight

nav:
  - Home: index.md
  - Getting Started:
      - Installation: installation.md
      - Quick Start: quickstart.md
      - Project Structure: project-structure.md
  - Guide:
      - Writing Tasks: tasks.md
      - Configuration: configuration.md
      - Variables: variables.md
      - Templates: templates.md
      - Contexts: contexts.md
      - Event Listeners: listeners.md
      - Environments: environments.md
  - Reference:
      - CLI Reference: cli.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true
