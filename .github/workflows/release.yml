name: Release

on:
  push:
    tags: ['[0-9]*']

permissions:
  contents: write

jobs:
  build:
    name: Build PHAR & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          ini-values: phar.readonly=0
          coverage: none

      - name: Install Box
        run: composer global require humbug/box

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-dev --optimize-autoloader

      - name: Build PHAR
        run: box compile

      - name: Verify PHAR
        run: |
          php build/sputnik.phar --version
          php build/sputnik.phar --version | grep -qv '@package_version@'
          php build/sputnik.phar list
          php build/sputnik.phar init --help

      - name: Smoke test PHAR
        run: |
          dir=$(mktemp -d)
          php build/sputnik.phar --working-dir="$dir" init
          php build/sputnik.phar --working-dir="$dir" example
          rm -rf "$dir"

      - name: Generate checksum
        run: cd build && sha256sum sputnik.phar > sputnik.phar.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            build/sputnik.phar
            build/sputnik.phar.sha256
          generate_release_notes: true
